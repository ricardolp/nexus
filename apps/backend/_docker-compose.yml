name: nexus-root-backend-db

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-root-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - '5432:5432'
    volumes:
      - nexus-root-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexus']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: nexus-root-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  redis:
    image: redis:7-alpine
    container_name: nexus-root-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nexus-root-postgres-data:
    driver: local
