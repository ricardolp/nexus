<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Senha alterada</title>
  </head>
  <body style="font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; padding: 24px;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 8px;">
      <tr>
        <td style="padding: 32px;">
          <h1 style="margin: 0 0 16px; color: #111827;">Olá, {{nome}}</h1>
          <p style="color: #4b5563; line-height: 1.6;">
            Sua senha foi alterada com sucesso. Se você não realizou esta alteração, entre em contato com o suporte imediatamente.
          </p>
          <p style="margin: 24px 0;">
            <a href="{{supportUrl}}" style="background: #111827; color: #ffffff; text-decoration: none; padding: 12px 20px; border-radius: 6px; display: inline-block;">
              Falar com suporte
            </a>
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
