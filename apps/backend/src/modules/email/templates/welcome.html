<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bem-vindo</title>
  </head>
  <body style="font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; padding: 24px;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 8px;">
      <tr>
        <td style="padding: 32px;">
          <h1 style="margin: 0 0 16px; color: #111827;">Bem-vindo, {{nome}}!</h1>
          <p style="color: #4b5563; line-height: 1.6;">
            Sua conta no {{appName}} foi criada com sucesso. Você já pode acessar a plataforma.
          </p>
          <p style="margin: 24px 0;">
            <a href="{{loginUrl}}" style="background: #2563eb; color: #ffffff; text-decoration: none; padding: 12px 20px; border-radius: 6px; display: inline-block;">
              Acessar plataforma
            </a>
          </p>
          <p style="color: #9ca3af; font-size: 12px; margin-top: 32px;">
            Se você não criou esta conta, ignore este e-mail.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
